<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧚 投资精灵 - 模拟盘</title>
  <style>
    :root {
      --bg: #0a0a12;
      --card: #13132a;
      --card-hover: #1a1a36;
      --accent: #7c5cfc;
      --accent-light: #a78bfa;
      --accent-glow: rgba(124, 92, 252, 0.2);
      --green: #22c55e;
      --green-bg: rgba(34,197,94,0.1);
      --red: #ef4444;
      --red-bg: rgba(239,68,68,0.1);
      --yellow: #eab308;
      --yellow-bg: rgba(234,179,8,0.1);
      --text: #e2e8f0;
      --text-dim: #8892a8;
      --border: #1e1e3a;
      --border-light: #2a2a4a;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .container { max-width:1280px; margin:0 auto; padding:24px; }

    /* Header */
    .header {
      display:flex; justify-content:space-between; align-items:flex-start;
      padding:32px 0 24px; border-bottom:1px solid var(--border); margin-bottom:28px;
    }
    .logo-area { display:flex; align-items:center; gap:16px; }
    .logo {
      width:52px; height:52px; border-radius:16px;
      background: linear-gradient(135deg, var(--accent), #c084fc);
      display:flex; align-items:center; justify-content:center;
      font-size:26px; box-shadow: 0 4px 20px var(--accent-glow);
    }
    .header h1 { font-size:22px; font-weight:700; color:var(--text); }
    .header .subtitle { color:var(--text-dim); font-size:13px; margin-top:2px; }
    .header-right { text-align:right; }
    .total-label { font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
    .total-amount { font-size:32px; font-weight:800; margin-top:4px; }
    .total-profit { font-size:14px; margin-top:2px; }
    .last-update { font-size:11px; color:var(--text-dim); margin-top:8px; }

    /* Edit Capital */
    .edit-btn {
      background:none; border:1px solid var(--border-light); color:var(--text-dim);
      padding:4px 14px; border-radius:6px; cursor:pointer; font-size:11px;
      margin-top:6px; transition:all .2s;
    }
    .edit-btn:hover { border-color:var(--accent); color:var(--accent-light); }

    /* Stats Grid */
    .stats { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:28px; }
    .stat {
      background:var(--card); border-radius:14px; padding:18px; border:1px solid var(--border);
      transition: transform .15s, box-shadow .15s;
    }
    .stat:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.3); }
    .stat .label { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.8px; }
    .stat .val { font-size:22px; font-weight:700; margin-top:6px; }
    .stat .sub { font-size:12px; margin-top:3px; }

    /* Tabs */
    .tabs {
      display:flex; gap:2px; margin-bottom:24px;
      background:var(--card); border-radius:12px; padding:3px; width:fit-content;
      border:1px solid var(--border);
    }
    .tab {
      padding:10px 28px; border-radius:10px; cursor:pointer;
      font-size:14px; font-weight:500; color:var(--text-dim);
      transition:all .2s; border:none; background:none;
    }
    .tab:hover { color:var(--text); background:rgba(255,255,255,.03); }
    .tab.active { background:var(--accent); color:white; box-shadow:0 2px 12px var(--accent-glow); }

    /* Table */
    .tbl-wrap {
      background:var(--card); border-radius:14px; border:1px solid var(--border);
      overflow:hidden; margin-bottom:24px;
    }
    table { width:100%; border-collapse:collapse; }
    th {
      text-align:left; padding:14px 18px; font-size:11px;
      text-transform:uppercase; letter-spacing:.8px;
      color:var(--text-dim); border-bottom:1px solid var(--border); font-weight:600;
      background:rgba(0,0,0,.2);
    }
    td { padding:16px 18px; font-size:14px; border-bottom:1px solid var(--border); }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--card-hover); }
    .fname { font-weight:600; margin-bottom:2px; }
    .fcode { font-size:12px; color:var(--text-dim); }

    /* Pie Chart Area */
    .alloc-section {
      display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px;
    }
    .alloc-card {
      background:var(--card); border-radius:14px; border:1px solid var(--border); padding:24px;
    }
    .alloc-card h3 {
      font-size:14px; font-weight:600; margin-bottom:16px; color:var(--text-dim);
      text-transform:uppercase; letter-spacing:.5px;
    }
    .alloc-bar { display:flex; flex-direction:column; gap:10px; }
    .alloc-item { display:flex; align-items:center; gap:10px; }
    .alloc-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .alloc-name { font-size:13px; flex:1; }
    .alloc-pct { font-size:13px; font-weight:600; }
    .bar-track { height:6px; background:var(--border); border-radius:3px; flex:2; }
    .bar-fill { height:100%; border-radius:3px; transition:width .5s ease; }

    /* Timeline */
    .timeline { position:relative; padding-left:36px; }
    .timeline::before {
      content:''; position:absolute; left:13px; top:8px; bottom:8px;
      width:2px; background:linear-gradient(to bottom, var(--accent), var(--border));
    }
    .tl-item {
      position:relative; margin-bottom:20px; background:var(--card);
      border-radius:14px; padding:24px; border:1px solid var(--border);
      transition: transform .15s;
    }
    .tl-item:hover { transform:translateX(4px); }
    .tl-item::before {
      content:''; position:absolute; left:-29px; top:28px; width:12px; height:12px;
      border-radius:50%; background:var(--accent); border:3px solid var(--bg);
      box-shadow:0 0 12px var(--accent-glow);
    }
    .tl-date { font-size:13px; color:var(--accent-light); font-weight:600; margin-bottom:10px; }
    .tl-text { font-size:14px; line-height:1.8; margin-bottom:14px; }
    .tl-ops { display:flex; flex-wrap:wrap; gap:8px; }

    .tag {
      padding:5px 14px; border-radius:20px; font-size:12px; font-weight:600;
      display:inline-flex; align-items:center; gap:4px;
    }
    .tag-buy { background:var(--green-bg); color:var(--green); }
    .tag-sell { background:var(--red-bg); color:var(--red); }
    .tag-hold { background:var(--yellow-bg); color:var(--yellow); }

    /* Operation Cards */
    .op-card {
      background:var(--card); border-radius:14px; padding:22px;
      border:1px solid var(--border); margin-bottom:14px;
      transition: transform .15s;
    }
    .op-card:hover { transform:translateY(-2px); }
    .op-head {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:10px; flex-wrap:wrap; gap:8px;
    }
    .op-head-left { display:flex; align-items:center; gap:10px; }
    .op-type {
      padding:4px 14px; border-radius:20px; font-size:12px; font-weight:700;
    }
    .op-fund { font-weight:600; font-size:15px; }
    .op-code { font-size:12px; color:var(--text-dim); }
    .op-amt { font-size:20px; font-weight:700; }
    .op-meta { font-size:12px; color:var(--text-dim); margin-bottom:12px; }
    .op-reason {
      font-size:13px; color:var(--text); line-height:1.7; padding:14px 16px;
      background:rgba(124,92,252,.04); border-radius:10px;
      border-left:3px solid var(--accent);
    }

    /* Chart Modal */
    .chart-modal-bg {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.75);
      z-index:200; justify-content:center; align-items:center; backdrop-filter:blur(6px);
    }
    .chart-modal-bg.show { display:flex; }
    .chart-modal {
      background:var(--card); border-radius:18px; padding:28px 32px 24px;
      width:94%; max-width:820px; border:1px solid var(--border-light);
      box-shadow:0 20px 60px rgba(0,0,0,.5); position:relative;
    }
    .chart-modal .cm-close {
      position:absolute; top:16px; right:20px; background:none; border:none;
      color:var(--text-dim); font-size:22px; cursor:pointer; transition:color .2s;
      width:32px; height:32px; display:flex; align-items:center; justify-content:center;
      border-radius:8px;
    }
    .chart-modal .cm-close:hover { color:var(--text); background:rgba(255,255,255,.06); }
    .chart-modal .cm-title { font-size:18px; font-weight:700; margin-bottom:4px; }
    .chart-modal .cm-sub { font-size:13px; color:var(--text-dim); margin-bottom:20px; }
    .chart-modal .cm-legend {
      display:flex; gap:20px; margin-bottom:16px; font-size:12px; color:var(--text-dim);
    }
    .chart-modal .cm-legend span { display:flex; align-items:center; gap:6px; }
    .chart-modal .cm-legend .dot {
      width:10px; height:10px; border-radius:50%; display:inline-block;
    }
    .chart-modal .cm-loading {
      display:flex; justify-content:center; align-items:center; height:300px;
      color:var(--text-dim); font-size:14px;
    }
    .chart-modal .cm-loading .spinner { margin-right:10px; }
    .chart-canvas-wrap {
      position:relative; width:100%; height:320px;
    }
    .chart-canvas-wrap canvas {
      width:100%; height:100%;
    }
    .chart-tooltip {
      display:none; position:absolute; pointer-events:none;
      background:var(--card); border:1px solid var(--border-light);
      border-radius:10px; padding:10px 14px; font-size:12px;
      box-shadow:0 8px 24px rgba(0,0,0,.4); z-index:10; white-space:nowrap;
    }
    .chart-tooltip .ct-date { color:var(--text-dim); margin-bottom:4px; }
    .chart-tooltip .ct-nav { font-size:15px; font-weight:700; }
    .chart-tooltip .ct-change { font-size:12px; margin-top:2px; }
    .chart-tooltip .ct-op { margin-top:6px; padding-top:6px; border-top:1px solid var(--border); font-size:11px; font-weight:600; }

    /* Clickable row */
    tr.clickable-row { cursor:pointer; transition:background .15s; }
    tr.clickable-row:hover td { background:var(--card-hover); }

    /* No-op card */
    .noop-card {
      background:var(--card); border-radius:14px; padding:22px;
      border:1px solid var(--border); margin-bottom:14px;
    }
    .noop-head { display:flex; align-items:center; gap:8px; font-weight:600; color:var(--yellow); margin-bottom:8px; }
    .noop-text { font-size:13px; color:var(--text-dim); line-height:1.7; }

    /* Empty */
    .empty { text-align:center; padding:60px 20px; color:var(--text-dim); }
    .empty .em { font-size:48px; margin-bottom:16px; }
    .empty p { font-size:14px; max-width:400px; margin:0 auto; line-height:1.7; }

    /* Modal */
    .modal-bg {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.7);
      z-index:100; justify-content:center; align-items:center; backdrop-filter:blur(4px);
    }
    .modal-bg.show { display:flex; }
    .modal {
      background:var(--card); border-radius:18px; padding:32px;
      width:90%; max-width:420px; border:1px solid var(--border-light);
      box-shadow:0 20px 60px rgba(0,0,0,.5);
    }
    .modal h3 { margin-bottom:6px; font-size:18px; }
    .modal .modal-desc { color:var(--text-dim); font-size:13px; margin-bottom:20px; }
    .modal input {
      width:100%; padding:14px; border-radius:10px; border:1px solid var(--border-light);
      background:var(--bg); color:var(--text); font-size:18px; font-weight:600;
      margin-bottom:20px; outline:none; transition:border .2s;
    }
    .modal input:focus { border-color:var(--accent); }
    .modal-acts { display:flex; gap:12px; justify-content:flex-end; }
    .btn {
      padding:12px 28px; border-radius:10px; border:none; cursor:pointer;
      font-size:14px; font-weight:600; transition:all .2s;
    }
    .btn-p { background:var(--accent); color:white; }
    .btn-p:hover { background:#6b4fe6; }
    .btn-g { background:none; color:var(--text-dim); border:1px solid var(--border); }
    .btn-g:hover { border-color:var(--text-dim); }

    /* Loading */
    .loading {
      display:flex; justify-content:center; align-items:center;
      padding:80px; color:var(--text-dim);
    }
    .spinner {
      width:24px; height:24px; border:3px solid var(--border);
      border-top-color:var(--accent); border-radius:50%;
      animation:spin .8s linear infinite; margin-right:12px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    .positive { color:var(--green); }
    .negative { color:var(--red); }
    .neutral { color:var(--text-dim); }

    /* Responsive */
    @media (max-width:900px) {
      .stats { grid-template-columns:repeat(3,1fr); }
      .alloc-section { grid-template-columns:1fr; }
    }
    @media (max-width:640px) {
      .stats { grid-template-columns:repeat(2,1fr); }
      .container { padding:14px; }
      .header { flex-direction:column; gap:20px; }
      .header-right { text-align:left; }
      .total-amount { font-size:26px; }
      .op-head { flex-direction:column; align-items:flex-start; }
    }

    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-area">
        <div class="logo">🧚</div>
        <div>
          <h1>投资精灵</h1>
          <div class="subtitle">场外基金模拟盘 · AI 驱动决策</div>
        </div>
      </div>
      <div class="header-right">
        <div class="total-label">总资产</div>
        <div class="total-amount" id="totalAssets">--</div>
        <div class="total-profit" id="totalProfitHeader">--</div>
        <div class="last-update" id="lastUpdate"></div>
        <button class="edit-btn" onclick="showModal()">✏️ 修改本金</button>
      </div>
    </div>

    <div class="stats" id="statsGrid">
      <div class="stat"><div class="label">初始本金</div><div class="val" id="s_capital">--</div></div>
      <div class="stat"><div class="label">可用现金</div><div class="val" id="s_cash">--</div></div>
      <div class="stat"><div class="label">持仓市值</div><div class="val" id="s_posval">--</div></div>
      <div class="stat"><div class="label">总收益</div><div class="val" id="s_profit">--</div><div class="sub" id="s_profitRate">--</div></div>
      <div class="stat"><div class="label">持仓数量</div><div class="val" id="s_count">--</div></div>
      <div class="stat"><div class="label">运行天数</div><div class="val" id="s_days">--</div></div>
    </div>

    <div class="tabs" id="tabBar">
      <button class="tab active" data-tab="positions">💼 持仓总览</button>
      <button class="tab" data-tab="timeline">📅 时间轨迹</button>
      <button class="tab" data-tab="operations">📋 操作记录</button>
    </div>

    <div id="tab-positions" class="tab-content">
      <div id="allocSection"></div>
      <div id="positionsTable" class="tbl-wrap">
        <div class="loading"><div class="spinner"></div>加载中...</div>
      </div>
    </div>

    <div id="tab-timeline" class="tab-content" style="display:none">
      <div id="timelineBox">
        <div class="loading"><div class="spinner"></div>加载中...</div>
      </div>
    </div>

    <div id="tab-operations" class="tab-content" style="display:none">
      <div id="opsBox">
        <div class="loading"><div class="spinner"></div>加载中...</div>
      </div>
    </div>
  </div>

  <!-- Chart Modal -->
  <div class="chart-modal-bg" id="chartModal">
    <div class="chart-modal">
      <button class="cm-close" onclick="hideChart()">✕</button>
      <div class="cm-title" id="cmTitle">--</div>
      <div class="cm-sub" id="cmSub">--</div>
      <div class="cm-legend">
        <span><span class="dot" style="background:var(--accent)"></span>净值走势</span>
        <span><span class="dot" style="background:var(--green)"></span>买入 (建仓/加仓)</span>
        <span><span class="dot" style="background:var(--red)"></span>卖出 (减仓/清仓)</span>
      </div>
      <div id="cmBody">
        <div class="cm-loading"><div class="spinner"></div>加载历史净值...</div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-bg" id="modal">
    <div class="modal">
      <h3>修改总本金</h3>
      <div class="modal-desc">修改后可用现金将相应调整，已有持仓不受影响。</div>
      <input type="number" id="capInput" placeholder="输入新的总本金" />
      <div class="modal-acts">
        <button class="btn btn-g" onclick="hideModal()">取消</button>
        <button class="btn btn-p" onclick="saveCap()">确认修改</button>
      </div>
    </div>
  </div>

  <script>
    const COLORS = ['#7c5cfc','#22c55e','#ef4444','#eab308','#06b6d4','#f97316','#ec4899','#8b5cf6','#14b8a6','#f43f5e'];
    let D = {};

    // Tab switching
    document.getElementById('tabBar').addEventListener('click', e => {
      const tab = e.target.closest('.tab');
      if (!tab) return;
      document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tab.dataset.tab).style.display = 'block';
      tab.classList.add('active');
    });

    function showModal() {
      document.getElementById('modal').classList.add('show');
      document.getElementById('capInput').value = D.portfolio?.totalCapital || '';
      document.getElementById('capInput').focus();
    }
    function hideModal() { document.getElementById('modal').classList.remove('show'); }

    async function saveCap() {
      const v = parseFloat(document.getElementById('capInput').value);
      if (!v || v <= 0) return alert('请输入有效金额');
      try {
        const r = await fetch('/api/config/capital', {
          method:'PUT', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({totalCapital:v})
        });
        const d = await r.json();
        if (d.success) { hideModal(); loadAll(); }
        else alert(d.error || '修改失败');
      } catch(e) { alert('网络错误'); }
    }

    function $(id) { return document.getElementById(id); }
    function fmtCny(n) { return '¥' + Number(n||0).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}); }
    function fmtPct(n) { return (n>=0?'+':'') + Number(n||0).toFixed(2) + '%'; }
    function cls(n) { return n > 0.001 ? 'positive' : n < -0.001 ? 'negative' : 'neutral'; }

    async function loadAll() {
      try {
        const r = await fetch('/api/summary');
        D = await r.json();
        render();
      } catch(e) {
        console.warn('API 不可用，尝试加载静态数据...', e);
        try {
          const [p, o, r2, c] = await Promise.all([
            fetch('data/portfolio.json').then(r=>r.json()),
            fetch('data/operations.json').then(r=>r.json()),
            fetch('data/daily-reports.json').then(r=>r.json()),
            fetch('config.json').then(r=>r.json()).catch(()=>({}))
          ]);
          D = { portfolio: p, operations: o, reports: r2, config: c };
          render();
        } catch(e2) {
          console.error('静态数据也加载失败', e2);
        }
      }
    }

    function render() {
      const p = D.portfolio, c = D.config, ops = D.operations?.operations||[], rpts = D.reports?.reports||[];
      if (!p) return;

      const posVal = p.positions.reduce((s,x) => s + x.currentValue, 0);
      const totalCost = p.positions.reduce((s,x) => s + x.totalCost, 0);
      const totalAssets = p.availableCash + posVal;
      const profit = totalAssets - p.totalCapital;
      const profitRate = p.totalCapital > 0 ? (profit/p.totalCapital)*100 : 0;

      $('totalAssets').textContent = fmtCny(totalAssets);
      $('totalAssets').className = 'total-amount';

      const ph = $('totalProfitHeader');
      ph.textContent = `收益 ${fmtCny(profit)} (${fmtPct(profitRate)})`;
      ph.className = 'total-profit ' + cls(profit);

      if (p.lastUpdated) $('lastUpdate').textContent = '更新于 ' + p.lastUpdated;

      $('s_capital').textContent = fmtCny(p.totalCapital);
      $('s_cash').textContent = fmtCny(p.availableCash);
      $('s_posval').textContent = fmtCny(posVal);

      const sp = $('s_profit');
      sp.textContent = fmtCny(profit);
      sp.className = 'val ' + cls(profit);
      const sr = $('s_profitRate');
      sr.textContent = fmtPct(profitRate);
      sr.className = 'sub ' + cls(profitRate);

      $('s_count').textContent = p.positions.length;
      if (c?.created) {
        const days = Math.max(0, Math.floor((Date.now() - new Date(c.created+'T00:00:00+08:00').getTime()) / 86400000));
        $('s_days').textContent = days || '< 1';
      }

      renderPositions(p, totalAssets);
      renderTimeline(rpts, ops);
      renderOperations(ops, rpts);
    }

    function renderPositions(p, totalAssets) {
      // Allocation section
      const allocEl = $('allocSection');
      if (p.positions.length) {
        let cashPct = (p.availableCash / totalAssets * 100);
        let bars = p.positions.map((pos, i) => {
          const pct = (pos.currentValue / totalAssets * 100);
          const color = COLORS[i % COLORS.length];
          return `<div class="alloc-item">
            <div class="alloc-dot" style="background:${color}"></div>
            <div class="alloc-name">${pos.name}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
            <div class="alloc-pct">${pct.toFixed(1)}%</div>
          </div>`;
        }).join('');
        bars += `<div class="alloc-item">
          <div class="alloc-dot" style="background:var(--text-dim)"></div>
          <div class="alloc-name">现金</div>
          <div class="bar-track"><div class="bar-fill" style="width:${cashPct}%;background:var(--text-dim)"></div></div>
          <div class="alloc-pct">${cashPct.toFixed(1)}%</div>
        </div>`;

        allocEl.innerHTML = `<div class="alloc-section"><div class="alloc-card"><h3>📊 仓位分布</h3><div class="alloc-bar">${bars}</div></div></div>`;
      } else {
        allocEl.innerHTML = '';
      }

      // Table
      const tbl = $('positionsTable');
      if (!p.positions.length) {
        tbl.innerHTML = `<div class="empty"><div class="em">🧚</div><p>投资精灵正在分析市场，还未建仓。<br>首次分析后将展示持仓信息。</p></div>`;
        return;
      }

      let html = `<table><thead><tr>
        <th>基金</th><th>持仓成本</th><th>当前市值</th><th>收益</th><th>收益率</th><th>仓位占比</th>
      </tr></thead><tbody>`;

      p.positions.forEach((pos, i) => {
        const profit = pos.currentValue - pos.totalCost;
        const rate = pos.totalCost > 0 ? (profit/pos.totalCost)*100 : 0;
        const ratio = (pos.currentValue / totalAssets * 100);
        const dot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${COLORS[i%COLORS.length]};margin-right:8px"></span>`;
        html += `<tr class="clickable-row" onclick="showChart('${pos.code}','${pos.name}')">
          <td>${dot}<span class="fname">${pos.name}</span><br><span class="fcode">${pos.code} · 净值 ${pos.currentNav}</span></td>
          <td>${fmtCny(pos.totalCost)}</td>
          <td>${fmtCny(pos.currentValue)}</td>
          <td class="${cls(profit)}">${fmtCny(profit)}</td>
          <td class="${cls(rate)}">${fmtPct(rate)}</td>
          <td>${ratio.toFixed(1)}%</td>
        </tr>`;
      });
      html += '</tbody></table>';
      tbl.innerHTML = html;
    }

    function renderTimeline(rpts, ops) {
      const box = $('timelineBox');
      if (!rpts.length) {
        box.innerHTML = `<div class="empty"><div class="em">📅</div><p>暂无分析记录。<br>投资精灵每个交易日收盘前会进行分析。</p></div>`;
        return;
      }
      const sorted = [...rpts].sort((a,b)=>b.date.localeCompare(a.date));
      let html = '<div class="timeline">';
      sorted.forEach(r => {
        const dayOps = ops.filter(o => o.date === r.date);
        html += `<div class="tl-item">
          <div class="tl-date">${r.date} ${r.marketStatus||''}</div>
          <div class="tl-text">${r.summary.replace(/\n/g,'<br>')}</div>
          <div class="tl-ops">`;
        if (dayOps.length) {
          dayOps.forEach(o => {
            const t = (o.type==='建仓'||o.type==='加仓') ? 'tag-buy' : (o.type==='减仓'||o.type==='清仓') ? 'tag-sell' : 'tag-hold';
            html += `<span class="tag ${t}">${o.type} ${o.fundName} ${fmtCny(o.amount)}</span>`;
          });
        } else {
          html += `<span class="tag tag-hold">📌 今日无操作</span>`;
        }
        html += '</div></div>';
      });
      html += '</div>';
      box.innerHTML = html;
    }

    function renderOperations(ops, rpts) {
      const box = $('opsBox');
      if (!ops.length && !rpts.some(r=>r.noOpReason)) {
        box.innerHTML = `<div class="empty"><div class="em">📋</div><p>暂无操作记录。<br>投资精灵执行操作后将在此展示。</p></div>`;
        return;
      }
      const sorted = [...ops].sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time));
      let html = '';
      sorted.forEach(o => {
        const isBuy = o.type==='建仓'||o.type==='加仓';
        const t = isBuy ? 'tag-buy' : 'tag-sell';
        const sign = isBuy ? '-' : '+';
        html += `<div class="op-card">
          <div class="op-head">
            <div class="op-head-left">
              <span class="op-type ${t}">${o.type}</span>
              <span class="op-fund">${o.fundName}</span>
              <span class="op-code">${o.fundCode}</span>
            </div>
            <div class="op-amt ${isBuy?'':'positive'}">${sign}${fmtCny(o.amount)}</div>
          </div>
          <div class="op-meta">${o.date} ${o.time} · 净值 ${o.nav} · 份额 ${o.shares?.toFixed(2)||'--'}</div>
          <div class="op-reason">💡 ${o.reason}</div>
        </div>`;
      });

      rpts.filter(r=>r.noOpReason).sort((a,b)=>b.date.localeCompare(a.date)).forEach(r => {
        html += `<div class="noop-card">
          <div class="noop-head">📌 ${r.date} — 未操作</div>
          <div class="noop-text">${r.noOpReason}</div>
        </div>`;
      });

      box.innerHTML = html;
    }

    // ---- Chart Feature ----
    function hideChart() { $('chartModal').classList.remove('show'); }
    $('chartModal').addEventListener('click', e => { if(e.target === $('chartModal')) hideChart(); });
    document.addEventListener('keydown', e => { if(e.key==='Escape') hideChart(); });

    async function showChart(code, name) {
      $('chartModal').classList.add('show');
      $('cmTitle').textContent = name;
      $('cmSub').textContent = code + ' · 近90日净值走势';
      $('cmBody').innerHTML = '<div class="cm-loading"><div class="spinner"></div>加载历史净值...</div>';

      try {
        // Fetch historical NAV via CORS proxy or direct
        const endDate = new Date().toISOString().slice(0,10);
        const sd = new Date(Date.now() - 100*86400000).toISOString().slice(0,10);
        const apiUrl = `https://api.fund.eastmoney.com/f10/lsjz?fundCode=${code}&pageIndex=1&pageSize=90&startDate=${sd}&endDate=${endDate}`;

        let data;
        try {
          const r = await fetch(apiUrl, { headers:{ 'Referer':'http://fundf10.eastmoney.com/' } });
          data = await r.json();
        } catch(e) {
          // Try CORS proxy fallback
          const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`;
          const r2 = await fetch(proxyUrl);
          data = await r2.json();
        }

        const items = (data?.Data?.LSJZList || []).reverse(); // oldest first
        if (!items.length) {
          $('cmBody').innerHTML = '<div class="cm-loading">暂无历史数据</div>';
          return;
        }

        // Get operations for this fund
        const ops = (D.operations?.operations || []).filter(o => o.fundCode === code);

        drawChart(items, ops, name);
      } catch(err) {
        console.error(err);
        $('cmBody').innerHTML = `<div class="cm-loading">加载失败：${err.message}</div>`;
      }
    }

    function drawChart(items, ops, name) {
      const wrap = document.createElement('div');
      wrap.className = 'chart-canvas-wrap';
      const canvas = document.createElement('canvas');
      const tooltip = document.createElement('div');
      tooltip.className = 'chart-tooltip';
      wrap.appendChild(canvas);
      wrap.appendChild(tooltip);
      $('cmBody').innerHTML = '';
      $('cmBody').appendChild(wrap);

      const dpr = window.devicePixelRatio || 1;
      const rect = wrap.getBoundingClientRect();
      const W = rect.width;
      const H = 320;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);

      // Parse data
      const dates = items.map(d => d.FSRQ);
      const navs = items.map(d => parseFloat(d.DWJZ));
      const changes = items.map(d => d.JZZZL ? parseFloat(d.JZZZL) : null);
      const n = navs.length;

      // Build operation map: date -> [{type, amount, nav}]
      const opMap = {};
      ops.forEach(o => {
        if (!opMap[o.date]) opMap[o.date] = [];
        opMap[o.date].push(o);
      });

      // Chart dimensions
      const padL = 60, padR = 20, padT = 20, padB = 50;
      const cW = W - padL - padR;
      const cH = H - padT - padB;

      const minNav = Math.min(...navs) * 0.998;
      const maxNav = Math.max(...navs) * 1.002;
      const navRange = maxNav - minNav || 1;

      function xPos(i) { return padL + (i / (n-1||1)) * cW; }
      function yPos(v) { return padT + cH - ((v - minNav) / navRange) * cH; }

      // Background
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(0, 0, W, H);

      // Grid lines
      const gridLines = 5;
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4,4]);
      for (let i = 0; i <= gridLines; i++) {
        const y = padT + (cH / gridLines) * i;
        ctx.beginPath();
        ctx.moveTo(padL, y);
        ctx.lineTo(W - padR, y);
        ctx.stroke();

        // Y-axis labels
        const val = maxNav - (navRange / gridLines) * i;
        ctx.fillStyle = '#666';
        ctx.font = '11px -apple-system, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(val.toFixed(4), padL - 8, y + 4);
      }
      ctx.setLineDash([]);

      // X-axis labels
      ctx.fillStyle = '#666';
      ctx.font = '11px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      const labelStep = Math.max(1, Math.floor(n / 6));
      for (let i = 0; i < n; i += labelStep) {
        const x = xPos(i);
        const label = dates[i].slice(5); // MM-DD
        ctx.fillText(label, x, H - padB + 20);
      }
      // Always show last date
      if (n > 1) {
        ctx.fillText(dates[n-1].slice(5), xPos(n-1), H - padB + 20);
      }

      // Area gradient
      const grad = ctx.createLinearGradient(0, padT, 0, padT + cH);
      grad.addColorStop(0, 'rgba(124,92,252,0.25)');
      grad.addColorStop(1, 'rgba(124,92,252,0.01)');
      ctx.beginPath();
      ctx.moveTo(xPos(0), yPos(navs[0]));
      for (let i = 1; i < n; i++) ctx.lineTo(xPos(i), yPos(navs[i]));
      ctx.lineTo(xPos(n-1), padT + cH);
      ctx.lineTo(xPos(0), padT + cH);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Line
      ctx.beginPath();
      ctx.moveTo(xPos(0), yPos(navs[0]));
      for (let i = 1; i < n; i++) ctx.lineTo(xPos(i), yPos(navs[i]));
      ctx.strokeStyle = '#7c5cfc';
      ctx.lineWidth = 2.5;
      ctx.lineJoin = 'round';
      ctx.stroke();

      // Operation dots
      const dotPositions = []; // for tooltip hit-testing
      for (let i = 0; i < n; i++) {
        const dateOps = opMap[dates[i]];
        if (!dateOps) continue;
        const x = xPos(i);
        const y = yPos(navs[i]);
        dateOps.forEach(op => {
          const isBuy = op.type === '建仓' || op.type === '加仓';
          const color = isBuy ? '#22c55e' : '#ef4444';
          // Outer glow
          ctx.beginPath();
          ctx.arc(x, y, 10, 0, Math.PI*2);
          ctx.fillStyle = isBuy ? 'rgba(34,197,94,0.2)' : 'rgba(239,68,68,0.2)';
          ctx.fill();
          // Dot
          ctx.beginPath();
          ctx.arc(x, y, 6, 0, Math.PI*2);
          ctx.fillStyle = color;
          ctx.fill();
          ctx.strokeStyle = '#0d0d1a';
          ctx.lineWidth = 2;
          ctx.stroke();

          dotPositions.push({ x, y, date: dates[i], nav: navs[i], op, isBuy });
        });
      }

      // Store points for hover tooltip
      const allPoints = dates.map((d, i) => ({
        x: xPos(i), y: yPos(navs[i]),
        date: d, nav: navs[i], change: changes[i],
        ops: opMap[d] || null
      }));

      // Hover interaction
      canvas.addEventListener('mousemove', e => {
        const cr = canvas.getBoundingClientRect();
        const mx = e.clientX - cr.left;
        const my = e.clientY - cr.top;

        // Find nearest point
        let closest = null, minDist = Infinity;
        allPoints.forEach(p => {
          const dist = Math.abs(p.x - mx);
          if (dist < minDist) { minDist = dist; closest = p; }
        });

        if (closest && minDist < 30) {
          tooltip.style.display = 'block';
          let left = closest.x + 16;
          if (left + 180 > W) left = closest.x - 196;
          let top = closest.y - 20;
          if (top < 0) top = 10;
          tooltip.style.left = left + 'px';
          tooltip.style.top = top + 'px';

          let html = `<div class="ct-date">${closest.date}</div>`;
          html += `<div class="ct-nav">净值 ${closest.nav.toFixed(4)}</div>`;
          if (closest.change !== null) {
            const c = closest.change >= 0 ? 'positive' : 'negative';
            html += `<div class="ct-change ${c}">${closest.change >= 0 ? '+' : ''}${closest.change}%</div>`;
          }
          if (closest.ops) {
            closest.ops.forEach(op => {
              const isBuy = op.type === '建仓' || op.type === '加仓';
              const color = isBuy ? 'var(--green)' : 'var(--red)';
              html += `<div class="ct-op" style="color:${color}">● ${op.type} ${fmtCny(op.amount)}</div>`;
            });
          }
          tooltip.innerHTML = html;

          // Draw crosshair
          redrawCrosshair(ctx, closest, allPoints, W, H, padL, padR, padT, padB, navs, n, xPos, yPos, opMap, dates, grad);
        } else {
          tooltip.style.display = 'none';
        }
      });

      canvas.addEventListener('mouseleave', () => {
        tooltip.style.display = 'none';
        // Redraw without crosshair
        redrawFull(ctx, W, H, padL, padR, padT, padB, cW, cH, minNav, maxNav, navRange, gridLines, dates, navs, n, xPos, yPos, opMap, grad);
      });
    }

    function redrawFull(ctx, W, H, padL, padR, padT, padB, cW, cH, minNav, maxNav, navRange, gridLines, dates, navs, n, xPos, yPos, opMap, grad) {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#0d0d1a';
      ctx.fillRect(0, 0, W, H);

      // Grid
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4,4]);
      for (let i = 0; i <= gridLines; i++) {
        const y = padT + (cH / gridLines) * i;
        ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W-padR, y); ctx.stroke();
        const val = maxNav - (navRange / gridLines) * i;
        ctx.fillStyle = '#666'; ctx.font = '11px -apple-system, sans-serif'; ctx.textAlign = 'right';
        ctx.fillText(val.toFixed(4), padL - 8, y + 4);
      }
      ctx.setLineDash([]);

      // X labels
      ctx.fillStyle = '#666'; ctx.font = '11px -apple-system, sans-serif'; ctx.textAlign = 'center';
      const labelStep = Math.max(1, Math.floor(n / 6));
      for (let i = 0; i < n; i += labelStep) ctx.fillText(dates[i].slice(5), xPos(i), H - padB + 20);
      if (n > 1) ctx.fillText(dates[n-1].slice(5), xPos(n-1), H - padB + 20);

      // Area
      ctx.beginPath(); ctx.moveTo(xPos(0), yPos(navs[0]));
      for (let i = 1; i < n; i++) ctx.lineTo(xPos(i), yPos(navs[i]));
      ctx.lineTo(xPos(n-1), padT + cH); ctx.lineTo(xPos(0), padT + cH);
      ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

      // Line
      ctx.beginPath(); ctx.moveTo(xPos(0), yPos(navs[0]));
      for (let i = 1; i < n; i++) ctx.lineTo(xPos(i), yPos(navs[i]));
      ctx.strokeStyle = '#7c5cfc'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();

      // Dots
      for (let i = 0; i < n; i++) {
        const dateOps = opMap[dates[i]];
        if (!dateOps) continue;
        const x = xPos(i), y = yPos(navs[i]);
        dateOps.forEach(op => {
          const isBuy = op.type === '建仓' || op.type === '加仓';
          ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2);
          ctx.fillStyle = isBuy ? 'rgba(34,197,94,0.2)' : 'rgba(239,68,68,0.2)'; ctx.fill();
          ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI*2);
          ctx.fillStyle = isBuy ? '#22c55e' : '#ef4444'; ctx.fill();
          ctx.strokeStyle = '#0d0d1a'; ctx.lineWidth = 2; ctx.stroke();
        });
      }
    }

    function redrawCrosshair(ctx, closest, allPoints, W, H, padL, padR, padT, padB, navs, n, xPos, yPos, opMap, dates, grad) {
      const cW = W - padL - padR, cH = H - padT - padB;
      const minNav = Math.min(...navs) * 0.998;
      const maxNav = Math.max(...navs) * 1.002;
      const navRange = maxNav - minNav || 1;
      redrawFull(ctx, W, H, padL, padR, padT, padB, cW, cH, minNav, maxNav, navRange, 5, dates, navs, n, xPos, yPos, opMap, grad);

      // Vertical crosshair
      ctx.strokeStyle = 'rgba(124,92,252,0.4)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4,4]);
      ctx.beginPath();
      ctx.moveTo(closest.x, padT);
      ctx.lineTo(closest.x, padT + cH);
      ctx.stroke();
      ctx.setLineDash([]);

      // Highlight dot
      ctx.beginPath();
      ctx.arc(closest.x, closest.y, 5, 0, Math.PI*2);
      ctx.fillStyle = '#7c5cfc';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    loadAll();
    setInterval(loadAll, 30000);
  </script>
